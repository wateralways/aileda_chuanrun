name: Daily Strategy Scan

on:
  schedule:
    # 盘中扫描: 每天 UTC 06:45 (北京时间 14:45)
    - cron: '45 6 * * 1-5'
    # 盘后确认: 每天 UTC 11:00 (北京时间 19:00)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      scan_mode:
        description: '扫描模式'
        required: true
        default: 'daily'
        type: choice
        options:
          - realtime
          - daily

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # ===== 盘中扫描 (14:45 BJT) =====
    - name: 盘中扫描 (Realtime)
      if: github.event.schedule == '45 6 * * 1-5' || github.event_name == 'workflow_dispatch'
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        cd strategy
        python realtime_scan.py
        cd ..
    
    - name: Commit realtime data
      if: github.event.schedule == '45 6 * * 1-5' || github.event_name == 'workflow_dispatch'
      run: |
        cp strategy/reports/realtime_*.json reports/ 2>/dev/null || true
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/
        git diff --cached --quiet || git commit -m "⚡ Realtime scan $(date +%Y-%m-%d)"
        git push || true
    
    # 盘中扫描后部署实时报告到 Pages
    - name: Prepare site for Pages (realtime)
      if: github.event.schedule == '45 6 * * 1-5' || github.event_name == 'workflow_dispatch'
      run: |
        mkdir -p _site/reports _site/docs
        cp strategy/reports/realtime_index.html _site/index.html
        cp strategy/reports/realtime_*.html _site/reports/ 2>/dev/null || true
        cp strategy/reports/realtime_*.json _site/reports/ 2>/dev/null || true
        cp docs/strategy.html _site/docs/
    
    - name: Setup Pages (realtime)
      if: github.event.schedule == '45 6 * * 1-5' || github.event_name == 'workflow_dispatch'
      uses: actions/configure-pages@v5
      
    - name: Upload artifact (realtime)
      if: github.event.schedule == '45 6 * * 1-5' || github.event_name == 'workflow_dispatch'
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'
        
    - name: Deploy to GitHub Pages (realtime)
      if: github.event.schedule == '45 6 * * 1-5' || github.event_name == 'workflow_dispatch'
      uses: actions/deploy-pages@v4
    
    # ===== 盘后确认 (19:00 BJT) =====
    - name: 盘后确认 (Daily)
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        cd strategy
        python daily_scan.py
        python report_generator.py
        cd ..
    
    - name: Copy strategy reports to root
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      run: |
        cp -r strategy/reports/* reports/ 2>/dev/null || true
    
    - name: Prepare site for Pages
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      run: |
        mkdir -p _site/reports
        mkdir -p _site/docs
        cp reports/index.html _site/reports/
        cp reports/*.html _site/reports/ 2>/dev/null || true
        cp docs/strategy.html _site/docs/
        # 根目录放一份最新报告作为首页
        cp reports/index.html _site/index.html
    
    - name: Setup Pages
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'
        
    - name: Deploy to GitHub Pages
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Commit reports
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/
        git diff --cached --quiet || git commit -m "📊 Daily strategy report $(date +%Y-%m-%d)"
        git push || true
