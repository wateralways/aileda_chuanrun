name: Daily Strategy Scan

on:
  schedule:
    # 每天 UTC 06:45 运行 (北京时间 14:45)
    - cron: '45 6 * * 1-5'
  workflow_dispatch:
    inputs:
      manual_run:
        description: '手动触发扫描'
        required: false
        default: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run daily scan
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        cd strategy
        python daily_scan.py
        python report_generator.py
        
    - name: Copy reports to docs
      run: |
        mkdir -p docs/reports
        cp reports/index.html docs/reports/
        cp -r docs/* _site/ 2>/dev/null || true
        mkdir -p _site/reports
        cp reports/index.html _site/reports/
        
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Commit reports
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/
        git diff --cached --quiet || git commit -m "📊 Daily strategy report $(date +%Y-%m-%d)"
        git push || true
